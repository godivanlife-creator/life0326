<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黃來福｜GodiVanLife</title>

<style>
:root{
--yellow:#ffe066;
--orange:#ff9f1c;
--accent:#ffbf69;
--text:#5a3e2b;
}

body{
margin:0;
padding:20px;
font-family:'PingFang TC','Microsoft JhengHei',sans-serif;
background:linear-gradient(-45deg,#ffe066,#ffbf69,#ffd166,#ffe066);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
text-align:center;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:28px;
border-radius:35px;
box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.profile-img{
width:200px;
height:200px;
border-radius:50%;
border:6px solid var(--orange);
object-fit:cover;
margin-bottom:18px;
animation:bounce 3s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

h1{
margin:10px 0;
font-size:26px;
color:var(--text);
}

.tagline{
font-size:14px;
color:#777;
margin-bottom:20px;
}

.info-card{
background:#fff8e1;
padding:18px;
border-radius:18px;
margin-bottom:20px;
line-height:1.6;
}

.btn{
display:block;
width:100%;
padding:14px;
margin:10px 0;
border-radius:25px;
border:none;
font-size:16px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
color:white;
}

.btn-call{
background:var(--orange);
}

.btn-sms{
background:#28a745;
}

.instagram-link{
display:block;
margin-top:12px;
padding:12px;
background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
color:white;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

footer{
margin-top:25px;
font-size:11px;
color:#999;
letter-spacing:2px;
}
</style>
</head>

<body>

<div class="container">

<img src="images/laifu.jpg" alt="黃來福" class="profile-img">

<h1>黃來福 🐶</h1>
<p class="tagline">GodiVanLife 調皮守護系統</p>

<div class="info-card">
😈 專門挑戰家人極限<br><br>
👂 我的耳朵就是我的特色
</div>

<button class="btn btn-sms" onclick="sendSMSLocation()">
📍 即時定位通報
</button>

<a href="tel:0905785458" class="btn btn-call">
📞 撥打主人
</a>

<a href="https://www.instagram.com/jrt.life0326" target="_blank" class="instagram-link">
看我的 IG 📸
</a>

<footer>
POWERED BY GODIVANLIFE
</footer>

</div>

<script>
function sendSMSLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(position){
const lat=position.coords.latitude;
const lng=position.coords.longitude;
const mapUrl="https://www.google.com/maps?q="+lat+","+lng;
const message=encodeURIComponent("【尋寵通報】我發現 黃來福！目前位置："+mapUrl);
window.location.href="sms:0905785458?body="+message;
});
}else{
window.location.href="sms:0905785458?body="+encodeURIComponent("【尋寵通報】我發現 黃來福，請與我聯繫。");
}
}
</script>

</body>
</html>
